<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TwoLinesTheory · Learning OS Pro · Refine Theme</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --font: 'Plus Jakarta Sans', 'Aptos', 'Segoe UI Variable', system-ui, sans-serif;
  --mono: 'DM Mono', 'Consolas', monospace;
  --radius-xs: 8px; --radius-sm: 12px; --radius-md: 16px; --radius-lg: 20px; --radius-xl: 28px; --radius-pill: 999px;
  --transition: .18s cubic-bezier(.4,0,.2,1);
  --transition-slow: .35s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  /* REFINE inspired palette from the shared screenshot:
     Deep Teal #003135 · Ocean Teal #024950 · Rust #964734 · Cyan #0FA4AF · Ice #AFDDE5 */
  --deep:       #003135;
  --teal:       #024950;
  --rust:       #964734;
  --cyan:       #0FA4AF;
  --ice:        #AFDDE5;
  --bg:         #003135;
  --bg-glass:   rgba(0,49,53,.86);
  --surface-0:  #002A2E;
  --surface-1:  #023F45;
  --surface-2:  #024950;
  --surface-3:  #075B63;
  --border:     rgba(175,221,229,.12);
  --border-hi:  rgba(175,221,229,.24);
  --ink-1:      #F2FDFF;
  --ink-2:      #C9EEF3;
  --ink-3:      #8FC8D0;
  --ink-4:      #5A9AA3;
  --accent:     #0FA4AF;
  --accent-2:   #0B8790;
  --accent-glow: rgba(15,164,175,.20);
  --accent-glow-hi: rgba(15,164,175,.36);
  --gold:       #AFDDE5;
  --gold-glow:  rgba(175,221,229,.20);
  --purple:     #7CCAD3;
  --purple-glow: rgba(124,202,211,.18);
  --blue:       #AFDDE5;
  --blue-glow:  rgba(175,221,229,.18);
  --red:        #B35A42;
  --red-glow:   rgba(150,71,52,.24);
  --green:      #64D6C6;
  --green-glow: rgba(100,214,198,.18);
  --amber:      #C67A52;
  --amber-glow: rgba(150,71,52,.22);
  --shadow-sm: 0 2px 10px rgba(0,18,20,.38);
  --shadow-md: 0 10px 28px rgba(0,18,20,.46);
  --shadow-lg: 0 24px 70px rgba(0,18,20,.58);
  --scrollbar: rgba(175,221,229,.22);
  --sidebar-w: 260px;
}
[data-theme="light"] {
  --deep:       #003135;
  --teal:       #024950;
  --rust:       #964734;
  --cyan:       #0FA4AF;
  --ice:        #AFDDE5;
  --bg:         #D9F0F4;
  --bg-glass:   rgba(217,240,244,.88);
  --surface-0:  #F4FCFD;
  --surface-1:  #E9F8FA;
  --surface-2:  #D0EDF2;
  --surface-3:  #AFDDE5;
  --border:     rgba(0,49,53,.10);
  --border-hi:  rgba(0,49,53,.18);
  --ink-1:      #003135;
  --ink-2:      #024950;
  --ink-3:      #2E7078;
  --ink-4:      #6399A1;
  --accent:     #0FA4AF;
  --accent-2:   #0B8790;
  --accent-glow: rgba(15,164,175,.14);
  --accent-glow-hi: rgba(15,164,175,.26);
  --gold:       #964734;
  --gold-glow:  rgba(150,71,52,.12);
  --purple:     #024950;
  --purple-glow: rgba(2,73,80,.12);
  --blue:       #0FA4AF;
  --blue-glow:  rgba(15,164,175,.14);
  --red:        #964734;
  --red-glow:   rgba(150,71,52,.14);
  --green:      #047A6F;
  --green-glow: rgba(4,122,111,.12);
  --amber:      #964734;
  --amber-glow: rgba(150,71,52,.12);
  --shadow-sm: 0 2px 8px rgba(0,49,53,.08);
  --shadow-md: 0 10px 24px rgba(0,49,53,.12);
  --shadow-lg: 0 20px 60px rgba(0,49,53,.18);
  --scrollbar: rgba(0,49,53,.22);
  --sidebar-w: 260px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--ink-1);line-height:1.6;min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:99px}

/* ─── APP SHELL ─── */
.app-layout {
  display:flex; min-height:100vh; min-height:100dvh;
}
/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  height: 100dvh;
  max-height: 100vh;
  max-height: 100dvh;
  background: var(--surface-0);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; z-index: 40;
  overflow: hidden; /* keeps the fixed sidebar inside the viewport */
  transition: transform var(--transition-slow);
}
.sidebar-logo {
  padding: 22px 20px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
.logo-mark {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  display: grid; place-items: center;
  font-weight: 800; font-size: 15px; color: #050505;
  flex-shrink: 0; box-shadow: 0 0 20px var(--accent-glow);
}
.logo-text h1 { font-size: 13.5px; font-weight: 800; letter-spacing: -.2px; color: var(--ink-1); line-height: 1.2; }
.logo-text p  { font-size: 10px; color: var(--ink-3); font-weight: 500; margin-top: 2px; letter-spacing:.3px; }

/* Profile mini in sidebar */
.sidebar-profile {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex: 0 0 auto;
}
.avatar-wrap {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg,var(--accent-glow-hi),var(--purple-glow));
  border: 2px solid var(--accent);
  overflow: hidden; flex-shrink: 0;
  display: grid; place-items: center;
  color: var(--accent); font-weight: 700; font-size: 16px;
  position: relative;
}
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-profile-info { min-width:0 }
.sidebar-profile-info strong { display:block; font-size:13px; font-weight:700; color:var(--ink-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-profile-info span { font-size:11px; color:var(--accent); font-weight:600; }

/* Nav items */
.sidebar-nav {
  flex: 1 1 auto;
  min-height: 0; /* critical: allows the nav area to shrink and become scrollable inside fixed sidebar */
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scrollbar-gutter: stable;
  padding: 10px 12px 18px;
  display:flex; flex-direction:column; gap:2px;
}
.nav-section { font-size:9.5px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-4); font-weight:700; padding:10px 8px 5px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  color: var(--ink-3); font-size: 13px; font-weight: 600;
  transition: all var(--transition); cursor: pointer;
  border: 1px solid transparent;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink-1); }
.nav-item.active {
  background: var(--accent-glow); color: var(--accent);
  border-color: var(--accent-glow-hi);
}
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
.nav-badge {
  margin-left:auto; background:var(--accent); color:#050505;
  border-radius:99px; padding:2px 7px; font-size:10px; font-weight:800;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display:flex; gap:8px;
  flex: 0 0 auto;
  background: var(--surface-0);
}
.sf-btn {
  flex:1; padding:8px 10px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--surface-2); color:var(--ink-2); font-size:12px; font-weight:700;
  transition:all var(--transition); display:flex; align-items:center; justify-content:center; gap:6px;
}
.sf-btn:hover { border-color:var(--accent); color:var(--accent); }
.sf-btn.primary { background:var(--accent); color:#050505; border-color:var(--accent); }
.sf-btn.primary:hover { filter:brightness(1.1); color:#050505; }

/* ─── CONTENT AREA ─── */
.content-area {
  margin-left: var(--sidebar-w);
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
}

/* ─── TOP BAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; gap: 16px;
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--ink-1); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.menu-btn { display:none; width:38px; height:38px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); align-items:center; justify-content:center; font-size:18px; border:1px solid var(--border); }
#mobileOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:39; }

/* ─── MAIN ─── */
.main { padding: 24px; max-width: 1500px; }
.tab-section { display:none; animation: fadeIn .2s ease; }
.tab-section.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ─── CARDS ─── */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-header {
  padding: 14px 18px;
  background: var(--surface-0);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; text-transform: uppercase; letter-spacing: .8px; font-weight: 800; color: var(--ink-2);
}
.dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); flex-shrink:0; }
.dot.gold  { background:var(--gold); box-shadow:0 0 8px var(--gold); }
.dot.purple{ background:var(--purple); box-shadow:0 0 8px var(--purple); }
.dot.blue  { background:var(--blue); box-shadow:0 0 8px var(--blue); }
.dot.red   { background:var(--red); box-shadow:0 0 8px var(--red); }
.card-body { padding:18px; }
.card-body-lg { padding:22px; }

/* ─── HERO BANNER ─── */
.hero-banner {
  background: linear-gradient(135deg, rgba(0,212,170,.12) 0%, transparent 50%, rgba(167,139,250,.1) 100%), var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px 32px;
  margin-bottom: 22px;
  position: relative; overflow: hidden;
}
.hero-banner::before {
  content:''; position:absolute; right:-80px; top:-80px;
  width:260px; height:260px; border-radius:50%;
  background: radial-gradient(circle, var(--accent-glow-hi), transparent 70%);
  pointer-events:none;
}
.eyebrow { font-size:10.5px; text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); font-weight:800; margin-bottom:10px; }
.hero-banner h2 { font-size:clamp(22px,3vw,34px); font-weight:800; line-height:1.15; letter-spacing:-.5px; color:var(--ink-1); }
.hero-banner p  { font-size:14px; color:var(--ink-3); margin-top:10px; max-width:720px; line-height:1.7; }
.hero-actions   { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }

/* ─── BUTTONS ─── */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 16px; border-radius:var(--radius-pill);
  font-size:12.5px; font-weight:700; cursor:pointer;
  transition:all var(--transition); border:1px solid var(--border);
  background:var(--surface-2); color:var(--ink-2);
}
.btn:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
.btn-primary { background:var(--accent); color:#050505; border-color:transparent; }
.btn-primary:hover { filter:brightness(1.1); color:#050505; transform:translateY(-1px); }
.btn-gold { background:var(--gold); color:#050505; border-color:transparent; }
.btn-gold:hover { filter:brightness(1.1); color:#050505; }
.btn-sm { padding:7px 12px; font-size:11.5px; }
.btn-xs { padding:5px 9px; font-size:11px; }
.btn-danger { border-color:rgba(248,113,113,.3); color:var(--red); }
.btn-danger:hover { background:var(--red-glow); }

/* ─── KPI GRID ─── */
.kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; margin-bottom:22px; }
.kpi-card {
  background:var(--surface-1); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px 16px;
  position:relative; overflow:hidden;
  transition:all var(--transition);
}
.kpi-card:hover { transform:translateY(-2px); border-color:var(--border-hi); box-shadow:var(--shadow-md); }
.kpi-card::before { content:''; position:absolute; left:0; top:0; right:0; height:3px; background:var(--kpi-color, var(--accent)); }
.kpi-val  { font-size:28px; font-weight:800; line-height:1; color:var(--ink-1); letter-spacing:-.5px; }
.kpi-label{ font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-4); font-weight:800; margin-top:8px; }
.kpi-sub  { font-size:11.5px; color:var(--ink-3); margin-top:4px; }
.kpi-icon { position:absolute; right:14px; top:14px; font-size:22px; opacity:.4; }

/* ─── GRIDS ─── */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.grid-auto { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }

/* ─── SECTION SPACER ─── */
.section-gap { margin-bottom: 22px; }

/* ─── PROGRESS ─── */
.progress-track { height:10px; background:var(--surface-3); border-radius:99px; overflow:hidden; }
.progress-fill  { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .5s ease; }
.progress-lg    { height:18px; }
.progress-meta  { display:flex; justify-content:space-between; margin-top:7px; font-size:12px; color:var(--ink-3); font-weight:600; }

/* ─── CHAPTER CARDS ─── */
.chapter-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:18px; }
.chapter-tile {
  background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:15px; cursor:pointer; transition:all var(--transition);
}
.chapter-tile:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow-sm); }
.chapter-tile.complete { border-color:var(--accent); background:var(--accent-glow); }
.chapter-tile-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.chapter-tile-title { font-size:13.5px; font-weight:700; color:var(--ink-1); margin:3px 0; }
.chapter-tile-meta  { font-size:10.5px; color:var(--ink-4); font-weight:700; text-transform:uppercase; letter-spacing:.6px; }
.chapter-tile-pct   { font-size:18px; font-weight:800; color:var(--accent); }

/* ─── CHIPS / BADGES ─── */
.chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 9px; border-radius:99px; font-size:10.5px; font-weight:700;
  border:1px solid var(--border); background:var(--surface-2); color:var(--ink-3);
}
.chip-accent  { color:var(--accent); border-color:var(--accent-glow-hi); background:var(--accent-glow); }
.chip-gold    { color:var(--gold); border-color:var(--gold-glow); background:var(--gold-glow); }
.chip-purple  { color:var(--purple); border-color:var(--purple-glow); background:var(--purple-glow); }
.chip-blue    { color:var(--blue); border-color:var(--blue-glow); background:var(--blue-glow); }
.chip-red     { color:var(--red); border-color:var(--red-glow); background:var(--red-glow); }
.chip-green   { color:var(--green); border-color:var(--green-glow); background:var(--green-glow); }
.chip-amber   { color:var(--amber); border-color:var(--amber-glow); background:var(--amber-glow); }
.chip-row     { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }

/* ─── STATUS BADGE ─── */
.status-badge { display:inline-flex; border-radius:99px; padding:4px 10px; font-size:10.5px; font-weight:800; text-transform:uppercase; }
.status-done    { color:var(--green); background:var(--green-glow); border:1px solid var(--green-glow); }
.status-doing   { color:var(--gold); background:var(--gold-glow); border:1px solid var(--gold-glow); }
.status-not     { color:var(--ink-4); background:var(--surface-3); border:1px solid var(--border); }

/* ─── FORMS ─── */
.form-input,.form-select,.form-textarea {
  border:1px solid var(--border-hi); background:var(--surface-0);
  color:var(--ink-1); border-radius:var(--radius-sm); padding:10px 13px;
  font-size:13px; font-weight:500; outline:none; width:100%;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.form-input:focus,.form-select:focus,.form-textarea:focus {
  border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow);
}
.form-select option { background:var(--surface-1); }
.form-textarea { resize:vertical; min-height:90px; }
.form-label { font-size:11.5px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; display:block; }
.form-group { display:flex; flex-direction:column; gap:0; }
.form-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.form-grid .span-2 { grid-column:span 2; }
.form-grid .span-4 { grid-column:1/-1; }

/* ─── TABLE ─── */
.table-wrap { overflow:auto; border-radius:var(--radius-lg); border:1px solid var(--border); background:var(--surface-1); }
table { width:100%; border-collapse:collapse; min-width:880px; font-size:13px; }
th { font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-4); background:var(--surface-0); padding:11px 14px; border-bottom:1px solid var(--border); font-weight:800; position:sticky; top:0; z-index:1; }
td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--ink-2); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(0,212,170,.03); }
.empty-row { padding:32px; text-align:center; color:var(--ink-4); font-weight:700; }

/* ─── ROADMAP ─── */
.roadmap-list { display:grid; gap:0; position:relative; }
.roadmap-list::before { content:''; position:absolute; left:20px; top:24px; bottom:24px; width:2px; background:linear-gradient(var(--accent),var(--purple)); opacity:.35; z-index:0; }
.roadmap-item { display:grid; grid-template-columns:42px 1fr; gap:14px; position:relative; padding-bottom:16px; }
.roadmap-num { width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg,var(--accent),var(--gold)); color:#050505; display:grid; place-items:center; font-weight:800; font-size:13px; z-index:1; align-self:flex-start; flex-shrink:0; box-shadow:0 4px 14px var(--accent-glow); }
.roadmap-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; }
.roadmap-card h4 { font-size:15px; font-weight:700; color:var(--ink-1); margin-bottom:5px; }
.roadmap-card p  { font-size:13px; color:var(--ink-3); }

/* ─── LESSON CARDS ─── */
.lesson-grid  { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.lesson-card  { border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--surface-1); overflow:hidden; transition:all var(--transition); }
.lesson-card:hover { border-color:var(--border-hi); transform:translateY(-2px); box-shadow:var(--shadow-md); }
.lesson-thumb {
  height:120px; background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size:36px;
  position:relative; overflow:hidden;
}
.lesson-thumb::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 30% 20%, var(--accent-glow), transparent 60%), linear-gradient(135deg,var(--surface-3),transparent); }
.lesson-thumb-icon { position:relative; z-index:1; }
.lesson-body { padding:15px; }
.lesson-meta { font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-4); font-weight:700; margin-bottom:5px; }
.lesson-body h4 { font-size:14.5px; font-weight:700; color:var(--ink-1); margin-bottom:5px; }
.lesson-body p  { font-size:12.5px; color:var(--ink-3); }

/* ─── CHECKLIST ─── */
.check-list  { display:grid; gap:8px; }
.check-item  { display:flex; align-items:flex-start; gap:10px; padding:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all var(--transition); }
.check-item:hover { border-color:var(--border-hi); }
.check-item input[type="checkbox"] { accent-color:var(--accent); width:16px; height:16px; margin-top:1px; flex-shrink:0; cursor:pointer; }
.check-item span { font-size:13px; color:var(--ink-2); font-weight:500; line-height:1.5; }
.check-item.checked span { text-decoration:line-through; color:var(--ink-4); }

/* ─── JOURNAL ─── */
.stat-strip { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
.stat-mini  { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; text-align:center; }
.stat-mini strong { display:block; font-size:22px; font-weight:800; color:var(--ink-1); }
.stat-mini span   { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-4); font-weight:700; margin-top:4px; display:block; }

/* ─── PROOF GALLERY ─── */
.proof-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.proof-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:all var(--transition); }
.proof-card:hover { border-color:var(--border-hi); transform:translateY(-2px); box-shadow:var(--shadow-md); }
.proof-thumb { height:160px; background:var(--surface-2); display:grid; place-items:center; color:var(--ink-4); font-size:12px; font-weight:600; overflow:hidden; }
.proof-thumb img { width:100%; height:100%; object-fit:cover; }
.proof-thumb .upload-placeholder { display:flex; flex-direction:column; align-items:center; gap:8px; }
.proof-thumb .upload-placeholder span { font-size:30px; }
.proof-body { padding:14px; }
.proof-body h4 { font-size:14px; font-weight:700; color:var(--ink-1); margin-bottom:4px; }
.proof-body p  { font-size:12px; color:var(--ink-3); }
.proof-upload-btn { display:block; width:100%; padding:7px; border:1.5px dashed var(--border-hi); border-radius:var(--radius-sm); text-align:center; color:var(--ink-3); font-size:12px; font-weight:600; cursor:pointer; margin-top:8px; transition:all var(--transition); }
.proof-upload-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ─── PROFILE ─── */
.profile-hero {
  background: linear-gradient(135deg,var(--accent-glow) 0%, transparent 60%, var(--purple-glow) 100%), var(--surface-1);
  border:1px solid var(--border); border-radius:var(--radius-xl); padding:28px;
  display:flex; gap:24px; align-items:flex-start; margin-bottom:22px;
}
.profile-avatar-big {
  width:90px; height:90px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent-glow-hi),var(--purple-glow));
  border:3px solid var(--accent); overflow:hidden;
  display:grid; place-items:center; color:var(--accent); font-size:32px; font-weight:700;
  cursor:pointer; position:relative;
}
.profile-avatar-big img { width:100%; height:100%; object-fit:cover; }
.profile-avatar-big .upload-hint {
  position:absolute; inset:0; background:rgba(0,0,0,.55); display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:4px;
  font-size:10px; font-weight:700; color:#fff; text-align:center;
  border-radius:50%;
}
.profile-avatar-big:hover .upload-hint { display:flex; }
.profile-info { flex:1; min-width:0; }
.profile-info h2 { font-size:22px; font-weight:800; color:var(--ink-1); }
.profile-info .track-chip { margin-top:6px; display:inline-flex; }
.profile-info .goal-text { font-size:13px; color:var(--ink-3); margin-top:8px; }
.profile-stats { display:flex; gap:20px; margin-top:14px; flex-wrap:wrap; }
.profile-stat  { text-align:center; }
.profile-stat strong { display:block; font-size:20px; font-weight:800; color:var(--ink-1); }
.profile-stat span   { font-size:11px; color:var(--ink-4); font-weight:600; }
.profile-form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.profile-form-grid .full { grid-column:1/-1; }

/* ─── PROGRESS CARD (shareable) ─── */
.progress-card-wrap {
  background: linear-gradient(135deg,#0a1a14,#0f1a28,#14102a);
  border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden;
  position:relative; padding:28px;
}
.progress-card-wrap::before {
  content:''; position:absolute; left:-100px; top:-100px; width:300px; height:300px;
  background:radial-gradient(circle, var(--accent-glow), transparent 65%); pointer-events:none;
}
.progress-card-wrap::after {
  content:''; position:absolute; right:-80px; bottom:-80px; width:250px; height:250px;
  background:radial-gradient(circle, var(--purple-glow), transparent 65%); pointer-events:none;
}
.pc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; position:relative; z-index:1; }
.pc-brand   { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); }
.pc-date    { font-size:11px; color:var(--ink-4); font-weight:600; }
.pc-name    { font-size:24px; font-weight:800; color:#f0f4ff; position:relative; z-index:1; margin-bottom:4px; }
.pc-track   { font-size:12px; color:var(--accent); font-weight:700; position:relative; z-index:1; margin-bottom:20px; }
.pc-stats   { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; position:relative; z-index:1; margin-bottom:20px; }
.pc-stat    { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:12px; text-align:center; }
.pc-stat strong { display:block; font-size:22px; font-weight:800; color:#f0f4ff; }
.pc-stat span   { font-size:9.5px; text-transform:uppercase; letter-spacing:.8px; color:rgba(255,255,255,.45); font-weight:700; margin-top:3px; display:block; }
.pc-overall { position:relative; z-index:1; margin-bottom:16px; }
.pc-overall-label { display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,.55); font-weight:600; margin-bottom:7px; }
.pc-bar-track { height:14px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden; }
.pc-bar-fill  { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:99px; }
.pc-chapters  { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; position:relative; z-index:1; margin-bottom:18px; }
.pc-ch { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:9px 10px; }
.pc-ch-name { font-size:11px; font-weight:700; color:rgba(255,255,255,.7); margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pc-ch-bar { height:5px; background:rgba(255,255,255,.1); border-radius:99px; overflow:hidden; }
.pc-ch-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:99px; }
.pc-ch-pct  { font-size:11px; font-weight:800; color:var(--accent); float:right; margin-top:-3px; }
.pc-footer  { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; padding-top:14px; border-top:1px solid rgba(255,255,255,.08); }
.pc-motto   { font-size:11.5px; color:rgba(255,255,255,.4); font-style:italic; font-weight:500; }
.pc-logo    { font-size:11px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
.pc-journal { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; position:relative; z-index:1; margin-bottom:16px; }
.pc-jstat { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:10px; text-align:center; }
.pc-jstat strong { display:block; font-size:18px; font-weight:800; color:#f0f4ff; }
.pc-jstat span   { font-size:9px; text-transform:uppercase; letter-spacing:.7px; color:rgba(255,255,255,.38); margin-top:3px; display:block; }

/* ─── MODAL ─── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show { display:flex; animation:fadeIn .15s ease; }
.modal-box {
  width:min(840px,100%); max-height:88vh; overflow-y:auto;
  background:var(--surface-1); border:1px solid var(--border-hi); border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg); padding:24px;
}
.modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.modal-head h3 { font-size:18px; font-weight:800; }
.modal-close { width:34px; height:34px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:18px; border:1px solid var(--border); cursor:pointer; }

/* ─── NOTE BOX ─── */
.note-box { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; color:var(--ink-2); font-size:13px; white-space:pre-wrap; line-height:1.7; }
.info-box { border:1px solid var(--gold-glow); background:var(--gold-glow); border-radius:var(--radius-md); padding:14px; font-size:12.5px; color:var(--ink-2); }
.info-box strong { color:var(--gold); }

/* ─── TOOLBAR ─── */
.toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.toolbar-left,.toolbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.search-input { background:var(--surface-1); border:1px solid var(--border-hi); color:var(--ink-1); border-radius:var(--radius-sm); padding:8px 14px; font-size:13px; font-weight:500; outline:none; min-width:260px; transition:all var(--transition); }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

/* ─── QUOTE ─── */
.quote-card {
  text-align:center; padding:20px 24px;
  border:1px solid var(--border); border-radius:var(--radius-lg);
  background:linear-gradient(90deg,var(--accent-glow),transparent 40%,var(--purple-glow));
  font-size:17px; font-weight:700; color:var(--ink-1); line-height:1.5;
  margin:16px 0; font-style:italic;
}

/* ─── ADMIN JSON ─── */
.admin-json { font-family:var(--mono); font-size:12px; min-height:280px; }

/* ─── TRADING SCREENSHOTS ─── */
.screenshot-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.screenshot-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:all var(--transition); }
.screenshot-card:hover { border-color:var(--border-hi); transform:translateY(-2px); box-shadow:var(--shadow-md); }
.screenshot-img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--surface-2); }
.screenshot-img-placeholder { aspect-ratio:16/9; background:var(--surface-2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--ink-4); font-size:13px; cursor:pointer; }
.screenshot-body { padding:14px; }
.screenshot-body h4 { font-size:13px; font-weight:700; color:var(--ink-1); }
.screenshot-body .screenshot-meta { font-size:11px; color:var(--ink-4); font-weight:600; margin-top:3px; }
.screenshot-body p { font-size:12px; color:var(--ink-3); margin-top:6px; }


/* ─── TRADING JOURNAL RITUAL MODULE ─── */
.ritual-grid { display:grid; grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr); gap:18px; align-items:start; }
.ritual-top-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:16px; }
.ritual-section { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.ritual-section-head { padding:12px 14px; background:var(--surface-0); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.ritual-section-head strong { font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-2); }
.ritual-section-head span { font-size:11px; color:var(--ink-4); font-weight:700; }
.ritual-section-body { padding:14px; }
.ritual-score-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
.ritual-score-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; position:relative; overflow:hidden; }
.ritual-score-card::before { content:''; position:absolute; left:0; top:0; right:0; height:3px; background:var(--accent); }
.ritual-score-card.gold::before { background:var(--gold); }
.ritual-score-card.red::before { background:var(--red); }
.ritual-score-card strong { display:block; font-size:26px; font-weight:800; color:var(--ink-1); line-height:1; }
.ritual-score-card span { display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--ink-4); font-weight:800; margin-top:8px; }
.ritual-meter { height:9px; border-radius:999px; background:var(--surface-3); overflow:hidden; margin-top:10px; }
.ritual-meter > i { display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--gold)); transition:width .25s ease; }
.ritual-status-list { display:grid; gap:9px; }
.ritual-status-item { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md); padding:11px 12px; }
.ritual-status-top { display:flex; justify-content:space-between; gap:10px; align-items:center; font-size:12px; font-weight:800; color:var(--ink-2); }
.ritual-status-top em { font-style:normal; font-size:11px; color:var(--ink-4); }
.ritual-emotion-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.ritual-emotion-grid label { display:flex; align-items:center; gap:7px; padding:8px 9px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface-2); font-size:11.5px; font-weight:700; color:var(--ink-3); cursor:pointer; }
.ritual-emotion-grid input { accent-color:var(--rust); }
.ritual-share-canvas { width:100%; max-width:460px; display:block; border:1px solid var(--border-hi); border-radius:var(--radius-lg); background:var(--surface-0); margin:auto; }
.journal-subtabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.journal-subtab { padding:8px 13px; border-radius:var(--radius-pill); border:1px solid var(--border); background:var(--surface-2); color:var(--ink-3); font-size:12px; font-weight:800; cursor:pointer; }
.journal-subtab.active { background:var(--accent); color:#001214; border-color:var(--accent); }
@media(max-width:1180px){ .ritual-grid{grid-template-columns:1fr} .ritual-top-grid{grid-template-columns:repeat(3,1fr)} .ritual-emotion-grid{grid-template-columns:repeat(3,1fr)} }
@media(max-width:700px){ .ritual-top-grid,.ritual-score-grid{grid-template-columns:1fr 1fr} .ritual-emotion-grid{grid-template-columns:1fr 1fr} }

/* ─── RESPONSIVE ─── */
@media(max-width:1280px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .proof-grid,.screenshot-grid{grid-template-columns:repeat(3,1fr)}
  .chapter-grid,.lesson-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-260px); --sidebar-w:260px}
  .sidebar.open{transform:translateX(0)}
  .content-area{margin-left:0}
  .menu-btn{display:flex}
  #mobileOverlay.show{display:block}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .proof-grid,.screenshot-grid,.chapter-grid,.lesson-grid,.grid-3,.grid-4,.pc-stats,.pc-chapters,.pc-journal{grid-template-columns:repeat(2,1fr)}
  .stat-strip{grid-template-columns:repeat(3,1fr)}
  .form-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid .span-2{grid-column:1/-1}
  .profile-hero{flex-direction:column; align-items:center; text-align:center}
  .profile-stats{justify-content:center}
}
@media(max-width:600px){
  .main{padding:16px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3,.grid-4,.proof-grid,.screenshot-grid,.chapter-grid,.lesson-grid,.stat-strip,.pc-stats,.pc-chapters,.pc-journal{grid-template-columns:1fr}
  .pc-chapters{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .hero-banner h2{font-size:22px}
  .search-input{min-width:100%;width:100%}
  .toolbar{flex-direction:column; align-items:stretch}
  .toolbar-left,.toolbar-right{width:100%}
  .form-select,.form-input{width:100%}
  .profile-form-grid{grid-template-columns:1fr}
}


/* ─── REFINE INSPIRED VISUAL THEME OVERRIDES ─── */
body {
  background:
    radial-gradient(circle at 12% 8%, rgba(175,221,229,.18), transparent 32%),
    radial-gradient(circle at 86% 18%, rgba(15,164,175,.18), transparent 34%),
    linear-gradient(135deg, var(--deep), var(--teal) 55%, #001F23 100%);
}
[data-theme="light"] body {
  background:
    radial-gradient(circle at 12% 8%, rgba(255,255,255,.72), transparent 34%),
    radial-gradient(circle at 85% 12%, rgba(15,164,175,.20), transparent 36%),
    linear-gradient(135deg, #DFF4F7, var(--ice) 55%, #C2E7ED 100%);
}
.sidebar {
  background: linear-gradient(180deg, var(--deep) 0%, var(--teal) 58%, #002A2E 100%);
  box-shadow: 12px 0 36px rgba(0,18,20,.22);
}
[data-theme="light"] .sidebar {
  background: linear-gradient(180deg, #F4FCFD 0%, #D7F0F4 58%, var(--ice) 100%);
}
.topbar {
  box-shadow: 0 10px 35px rgba(0,18,20,.18);
}
.logo-mark {
  background: linear-gradient(135deg, var(--accent) 0%, var(--ice) 68%, var(--rust) 100%);
  color: var(--deep);
  letter-spacing: .7px;
}
.nav-item.active {
  box-shadow: inset 3px 0 0 var(--accent), 0 10px 22px rgba(15,164,175,.10);
}
.hero-banner {
  background:
    linear-gradient(135deg, rgba(15,164,175,.23) 0%, rgba(2,73,80,.72) 48%, rgba(0,49,53,.94) 100%),
    radial-gradient(circle at 72% 18%, rgba(175,221,229,.20), transparent 34%),
    var(--surface-1);
  border-color: rgba(175,221,229,.18);
  box-shadow: var(--shadow-md);
}
[data-theme="light"] .hero-banner {
  background:
    linear-gradient(135deg, rgba(255,255,255,.70) 0%, rgba(175,221,229,.62) 48%, rgba(15,164,175,.18) 100%),
    var(--surface-1);
}
.hero-banner::before {
  background: radial-gradient(circle, rgba(175,221,229,.32), transparent 70%);
}
.card, .kpi-card, .lesson-card, .roadmap-card, .chapter-tile, .stat-mini, .proof-card, .screenshot-card {

}
.card-header, th {
  background: color-mix(in srgb, var(--surface-0) 84%, var(--teal));
}
.btn-primary, .sf-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--ice));
  color: var(--deep);
  box-shadow: 0 8px 22px rgba(15,164,175,.18);
}
.btn-gold {
  background: linear-gradient(135deg, var(--rust), #C67A52);
  color: #fff;
}
.progress-fill, .pc-bar-fill, .pc-ch-fill, .roadmap-num {
  background: linear-gradient(90deg, var(--accent), var(--ice));
  color: var(--deep);
}
.quote-card {
  background: linear-gradient(90deg, rgba(15,164,175,.18), transparent 40%, rgba(150,71,52,.16));
}
.progress-card-wrap {
  background: linear-gradient(135deg, #003135 0%, #024950 52%, #0B2B30 100%);
}

<body>

<!-- App Shell -->
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">TL</div>
      <div class="logo-text">
        <h1>TwoLinesTheory</h1>
        <p>Learning OS Pro · Refine Theme</p>
      </div>
    </div>
    <div class="sidebar-profile" onclick="openTab('profile')">
      <div class="avatar-wrap" id="sidebarAvatar">T</div>
      <div class="sidebar-profile-info">
        <strong id="sidebarName">Learner</strong>
        <span id="sidebarTrack">Trader + Investor</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="sf-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
      <button class="sf-btn primary" onclick="openTab('topics')">▶ Continue</button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div id="mobileOverlay" onclick="closeSidebar()"></div>

  <!-- Content -->
  <div class="content-area">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-actions">
        <button class="btn btn-sm" onclick="downloadState()">⬇ Export</button>
        <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">⬆ Import</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importState(event)"/>
      </div>
    </header>
    <main class="main" id="mainContent">
      <section id="tab-dashboard"   class="tab-section active"></section>
      <section id="tab-roadmap"     class="tab-section"></section>

function deepClone(o){return JSON.parse(JSON.stringify(o))}
function mergeDeep(target,source){for(const k in source){if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])){target[k]=mergeDeep(target[k]||{},source[k])}else{target[k]=source[k]}}return target}
function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}

let state = loadState();
function loadState(){
  let s=deepClone(DEFAULT_STATE);
  try{const saved=localStorage.getItem(STORE_KEY);if(saved)s=mergeDeep(s,JSON.parse(saved));}catch(e){}
  seedTopicStates(s); return s;
}
function seedTopicStates(s){
  for(const t of flatTopics())if(!s.topics[t.id])s.topics[t.id]={status:'not',confidence:0,notes:'',startDate:'',doneDate:'',updated:''};
}
function save(){
  state.app.theme=document.documentElement.dataset.theme;

}

function openTab(id){

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function flatTopics(){return CURRICULUM.flatMap(ch=>ch.topics.map((t,i)=>({id:t[0],title:t[1],desc:t[2],chapterId:ch.id,chapter:ch.title,track:ch.track,part:ch.part,level:ch.level,order:i+1,color:ch.color,icon:ch.icon})))}
function chapterStats(chapterId='all'){
  const topics=flatTopics().filter(t=>chapterId==='all'||t.chapterId===chapterId);
  const done=topics.filter(t=>state.topics[t.id]?.status==='done').length;
  const doing=topics.filter(t=>state.topics[t.id]?.status==='doing').length;
  const not=topics.length-done-doing;
  const pct=topics.length?Math.round(done/topics.length*100):0;
  const avg=topics.length?Math.round(topics.reduce((a,t)=>a+(+state.topics[t.id]?.confidence||0),0)/topics.length*20):0;
  return{total:topics.length,done,doing,not,pct,avg};
}
function overallStats(){
  const s=chapterStats('all');
  const chaptersDone=CURRICULUM.filter(c=>chapterStats(c.id).pct===100).length;
  const journal=state.journal||[];
  const wins=journal.filter(j=>j.result==='Win').length;
  const closed=journal.filter(j=>j.result&&j.result!=='Open').length;
  const daysLearning=state.learner.startDate?Math.max(1,Math.round((Date.now()-new Date(state.learner.startDate).getTime())/(1000*60*60*24))):0;
  return{...s,chaptersDone,totalChapters:CURRICULUM.length,journal:journal.length,winRate:closed?Math.round(wins/closed*100):0,points:journal.reduce((a,j)=>a+(Number(j.points)||0),0),daysLearning};
}

function todayISO(){ const d=new Date(); const off=d.getTimezoneOffset(); return new Date(d.getTime()-off*60000).toISOString().slice(0,10); }
const RITUAL_EMOS = ['FOMO','Overtrading','Late Entry','Early Exit','Re-Entry Urge','Fear','Greed','Increase Quantity','Decrease Quantity','Revenge Trade','Boredom Trade','Against Signal','Mixed Method','No-Rule Entry','No-Rule Exit','PNL Obsession'];
function defaultRitual(){ return {date:todayISO(),market:'BankNifty',goal:'',maxTrades:'2',maxLoss:'',method:'',yesList:'',noList:'',entryRule:'',exitRule:'',preMindset:false,story:'',plannedTrades:'',actualTrades:'',plannedRisk:'',actualRisk:'',lessons:'',postTruth:false,stopTarget:false,stopLoss:false,stopLimit:false,emotions:{},shareMode:'BEFORE'}; }
function getRitual(){ const base=defaultRitual(); state.ritual={...base,...(state.ritual||{}),emotions:{...(base.emotions||{}),...((state.ritual||{}).emotions||{})}}; return state.ritual; }
function persistOnly(){ try{ state.app.theme=document.documentElement.dataset.theme; localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){ console.warn('Save failed', e); } }
function updateRitualField(field,value){ const r=getRitual(); r[field]=value; persistOnly(); renderRitualDerived(); }
function updateRitualCheck(field,checked){ const r=getRitual(); r[field]=!!checked; persistOnly(); renderRitualDerived(); }
function updateRitualEmotion(name,checked){ const r=getRitual(); r.emotions[name]=!!checked; persistOnly(); renderRitualDerived(); }
function ritualScore(r=getRitual()){
  const hasLimits=(r.maxTrades||'').trim()!==''&&(r.maxLoss||'').trim()!=='';
  const oneMethod=(r.method||'').trim().length>=4;
  const planWritten=(r.yesList||'').trim()!==''&&(r.noList||'').trim()!==''&&(r.entryRule||'').trim()!==''&&(r.exitRule||'').trim()!=='';
  const lessonsCount=(r.lessons||'').split('\n').filter(x=>x.trim()).length;
  const truthDone=(r.story||'').trim()!==''&&lessonsCount>=3;
  const stopOk=!!(r.stopTarget||r.stopLoss||r.stopLimit);
  const planned=parseFloat(String(r.plannedTrades||'').replace(/[^\d.]/g,''))||0;
  const actual=parseFloat(String(r.actualTrades||'').replace(/[^\d.]/g,''))||0;
  const maxT=parseFloat(String(r.maxTrades||'').replace(/[^\d.]/g,''))||999;
  const overTrade=(planned>0&&actual>planned)||(actual>maxT);
  const emoOn=Object.entries(r.emotions||{}).filter(([k,v])=>!!v).map(([k])=>k);
  const leaks=['Overtrading','Boredom Trade','Revenge Trade','Mixed Method','Late Entry','No-Rule Entry','Against Signal'];
  const leakCount=leaks.filter(x=>emoOn.includes(x)).length;
  let discipline=0;
  discipline += hasLimits?18:0;
  discipline += oneMethod?16:0;
  discipline += planWritten?22:0;
  discipline += stopOk?18:0;
  discipline += r.preMindset?13:0;
  discipline += r.postTruth?13:0;
  discipline = Math.max(0,Math.min(100,discipline-(overTrade?12:0)-Math.min(18,leakCount*4)));
  const yesCount=(r.yesList||'').split('\n').filter(x=>x.trim()).length;
  const noCount=(r.noList||'').split('\n').filter(x=>x.trim()).length;
  let clarity=0;
  clarity += (r.goal||'').trim()?22:0;
  clarity += yesCount>=2?18:yesCount===1?10:0;
  clarity += noCount>=3?18:noCount===2?12:noCount===1?6:0;
  clarity += ((r.entryRule||'').trim()&&(r.exitRule||'').trim())?18:0;
  clarity += lessonsCount>=3?24:lessonsCount===2?14:lessonsCount===1?7:0;
  clarity=Math.max(0,Math.min(100,clarity));
  return {discipline,clarity,emoOn,hasLimits,oneMethod,planWritten,truthDone,stopOk,overTrade,leakCount,lessonsCount};
}
function ritualCoreLine(sc){ if(sc.discipline>=85&&sc.clarity>=80)return 'Small edge. Calm execution. Repeat.'; if(!sc.hasLimits)return 'Limits first. Then trading.'; if(!sc.planWritten)return 'Plan beats impulse.'; if(sc.overTrade)return 'Stop rule is the real strategy.'; if(sc.emoOn.length>=6)return 'Emotions are loud. Rules must be louder.'; return 'Take what the market gives — not what I want.'; }
function ritualFixLine(sc){ if(!sc.hasLimits)return 'Set max trades & max loss before open.'; if(!sc.oneMethod)return 'Use ONE method only — no hopping.'; if(!sc.planWritten)return 'Write YES/NO + entry/exit before market.'; if(!sc.truthDone)return 'Write 3 honest lessons after market.'; if(!sc.stopOk)return 'Stop after target/loss/trade limit.'; if(sc.emoOn.includes('Overtrading'))return 'Hard stop after max trades.'; if(sc.emoOn.includes('FOMO'))return 'No late entry; wait for setup.'; return 'Reduce one mistake by 1% daily.'; }
function compactBullets(txt){ const arr=String(txt||'').split('\n').map(x=>x.replace(/^•\s*/,'').trim()).filter(Boolean); return arr.length?arr.slice(0,4).join(' | ')+(arr.length>4?` (+${arr.length-4} more)`:''):'—'; }
function ritualStatusItems(sc){ const noScore=Math.max(0,100-(sc.leakCount*18)-(sc.overTrade?18:0)); return [
  ['Fixed limits', sc.hasLimits?'Set':'Missing', sc.hasLimits?100:25, sc.hasLimits],
  ['One method only', sc.oneMethod?'Locked':'Drifting', sc.oneMethod?100:35, sc.oneMethod],
  ['NO list respected', noScore+'%', noScore, noScore>=70],
  ['Plan written before market', sc.planWritten?'Done':'Missing', sc.planWritten?100:30, sc.planWritten],
  ['After-market truth + 3 lessons', sc.truthDone?'Done':'Missing', sc.truthDone?100:25, sc.truthDone],
  ['Stop rule followed', sc.stopOk?'Followed':'Broken', sc.stopOk?100:20, sc.stopOk]
]; }
function renderRitualDerived(){ const r=getRitual(), sc=ritualScore(r); const set=(id,html)=>{const el=document.getElementById(id); if(el)el.innerHTML=html;}; set('ritualDiscipline', Math.round(sc.discipline)); set('ritualClarity', Math.round(sc.clarity)); set('ritualEmotionLoad', sc.emoOn.length); const df=document.getElementById('ritualDisciplineFill'); if(df)df.style.width=sc.discipline+'%'; const cf=document.getElementById('ritualClarityFill'); if(cf)cf.style.width=sc.clarity+'%'; const ef=document.getElementById('ritualEmotionFill'); if(ef)ef.style.width=Math.min(100,sc.emoOn.length/16*100)+'%'; set('ritualCoreLine', ritualCoreLine(sc)); set('ritualFixLine', ritualFixLine(sc)); const status=document.getElementById('ritualStatusList'); if(status)status.innerHTML=ritualStatusItems(sc).map(([label,txt,pct,ok])=>`<div class="ritual-status-item"><div class="ritual-status-top"><span>${esc(label)}</span><em style="color:${ok?'var(--green)':'var(--red)'}">${esc(txt)}</em></div><div class="ritual-meter"><i style="width:${pct}%;background:${ok?'linear-gradient(90deg,var(--accent),var(--green))':'linear-gradient(90deg,var(--rust),var(--red))'}"></i></div></div>`).join(''); const share=document.getElementById('ritualShareText'); if(share){ share.value = `BEFORE (${r.market} | ${r.date})\nGoal: ${r.goal||'—'}\nMethod: ${r.method||'—'}\nYES: ${compactBullets(r.yesList)}\nNO: ${compactBullets(r.noList)}\nLimits: Max Trades ${r.maxTrades||'—'}, Max Loss ${r.maxLoss||'—'}\n\nAFTER (${r.market} | ${r.date})\nPlanned Trades: ${r.plannedTrades||'—'} | Actual Trades: ${r.actualTrades||'—'}\nPlanned Risk: ${r.plannedRisk||'—'} | Actual Risk: ${r.actualRisk||'—'}\nLessons: ${compactBullets(r.lessons)}\nEmotion Load: ${sc.emoOn.length?sc.emoOn.join(', '):'None'}\nOne Fix Tomorrow: ${ritualFixLine(sc)}\n\nCore Line: ${ritualCoreLine(sc)}\nDiscipline ${Math.round(sc.discipline)}/100 | Clarity ${Math.round(sc.clarity)}/100\n#PearlMind #TwoLinesTheory #TradingDiscipline`; }
  drawRitualCard(r.shareMode||'BEFORE'); }

function drawRitualCard(mode='BEFORE'){
  const r=getRitual(); r.shareMode=mode; persistOnly();
  const canvas=document.getElementById('ritualShareCanvas'); if(!canvas)return;
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height; const sc=ritualScore(r);
  ctx.clearRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,W,H); grad.addColorStop(0,'#003135'); grad.addColorStop(.55,'#024950'); grad.addColorStop(1,'#001d20'); ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0FA4AF'; ctx.lineWidth=2; roundCanvasRect(ctx,14,14,W-28,H-28,22); ctx.stroke();
  ctx.fillStyle='rgba(175,221,229,.08)'; roundCanvasRect(ctx,28,28,W-56,80,18); ctx.fill();
  ctx.textAlign='center'; ctx.fillStyle='#AFDDE5'; ctx.font='700 20px Plus Jakarta Sans, Arial'; ctx.fillText('Pearl Mind™ Daily Trading Ritual',W/2,62); ctx.fillStyle='#8FC8D0'; ctx.font='600 12px Plus Jakarta Sans, Arial'; ctx.fillText(`${mode} MARKET · ${r.market||'Market'} · ${r.date||todayISO()}`,W/2,86);
  ctx.fillStyle='#F2FDFF'; ctx.font='800 18px Plus Jakarta Sans, Arial'; ctx.fillText(state.learner.name||'TwoLines Learner',W/2,130);
  const drawScore=(x,y,label,val,color)=>{ ctx.fillStyle='rgba(0,0,0,.20)'; roundCanvasRect(ctx,x,y,108,68,14); ctx.fill(); ctx.fillStyle=color; ctx.font='800 28px Plus Jakarta Sans, Arial'; ctx.fillText(Math.round(val),x+54,y+36); ctx.fillStyle='#AFDDE5'; ctx.font='700 10px Plus Jakarta Sans, Arial'; ctx.fillText(label,x+54,y+54); };
  drawScore(34,150,'DISCIPLINE',sc.discipline,'#F5C842'); drawScore(156,150,'CLARITY',sc.clarity,'#0FA4AF'); drawScore(278,150,'EMOTIONS',sc.emoOn.length,sc.emoOn.length<=2?'#4ade80':sc.emoOn.length<=5?'#F5C842':'#f87171');
  let y=250;
  const writeBlock=(title,lines)=>{ ctx.fillStyle='rgba(175,221,229,.07)'; roundCanvasRect(ctx,28,y,W-56,132,16); ctx.fill(); ctx.textAlign='left'; ctx.fillStyle='#0FA4AF'; ctx.font='800 12px Plus Jakarta Sans, Arial'; ctx.fillText(title,46,y+24); ctx.fillStyle='#F2FDFF'; ctx.font='600 11px Plus Jakarta Sans, Arial'; let yy=y+48; lines.forEach(line=>{ wrapCanvasText(ctx,line,46,yy,W-92,15,2); yy+=30; }); y+=148; };
  if(mode==='BEFORE') writeBlock('BEFORE PLAN',[`Goal: ${r.goal||'—'}`,`Method: ${r.method||'—'}`,`YES: ${compactBullets(r.yesList)}`,`NO: ${compactBullets(r.noList)}`]);
  else writeBlock('AFTER REVIEW',[`Trades: Planned ${r.plannedTrades||'—'} | Actual ${r.actualTrades||'—'}`,`Risk: Planned ${r.plannedRisk||'—'} | Actual ${r.actualRisk||'—'}`,`Lessons: ${compactBullets(r.lessons)}`,`Emotion Load: ${sc.emoOn.length?sc.emoOn.join(', '):'None'}`]);
  writeBlock('CORE LINE + FIX',[`Core: ${ritualCoreLine(sc)}`,`Fix Tomorrow: ${ritualFixLine(sc)}`,`Limits: Max Trades ${r.maxTrades||'—'}, Max Loss ${r.maxLoss||'—'}`]);
  ctx.textAlign='center'; ctx.fillStyle='#AFDDE5'; ctx.font='700 11px Plus Jakarta Sans, Arial'; ctx.fillText('#PearlMind #TwoLinesTheory #TradingDiscipline',W/2,H-34);
}
function roundCanvasRect(ctx,x,y,w,h,r){ const rr=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.arcTo(x+w,y,x+w,y+h,rr); ctx.arcTo(x+w,y+h,x,y+h,rr); ctx.arcTo(x,y+h,x,y,rr); ctx.arcTo(x,y,x+w,y,rr); ctx.closePath(); }
function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight,maxLines=3){ const words=String(text||'').split(' '); let line='', lines=0; for(let n=0;n<words.length;n++){ const test=line+words[n]+' '; if(ctx.measureText(test).width>maxWidth&&n>0){ ctx.fillText(line,x,y); line=words[n]+' '; y+=lineHeight; lines++; if(lines>=maxLines-1){ break; } } else line=test; } ctx.fillText(line.trim(),x,y); }
function downloadRitualCard(mode='before'){ drawRitualCard(String(mode).toUpperCase().includes('AFTER')?'AFTER':'BEFORE'); const c=document.getElementById('ritualShareCanvas'); if(!c)return; const a=document.createElement('a'); a.download=`twolines_${mode}_ritual_${todayISO()}.png`; a.href=c.toDataURL('image/png'); a.click(); }

function formatMonth(m){const [y,mo]=m.split('-');const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (months[parseInt(mo)-1]||mo)+' '+y}

          "Day ${s.daysLearning} of learning TwoLinesTheory! Currently at <strong>${s.pct}% overall progress</strong>, completed <strong>${s.done} topics</strong> across ${s.chaptersDone} chapters. Journal entries: ${j.length}. Still going! 🚀 #TwoLinesTheory #LearningJourney"

}
function downloadProgressCard(){
  // Use html2canvas via CDN if available, else fallback to print
  const el=document.getElementById('progressCard');
  if(window.html2canvas){
    window.html2canvas(el,{scale:2,backgroundColor:null,useCORS:true}).then(canvas=>{const a=document.createElement('a');a.download='TwoLines_Progress_'+new Date().toISOString().slice(0,10)+'.png';a.href=canvas.toDataURL('image/png');a.click();});
  } else {
    // Load html2canvas dynamically
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload=()=>downloadProgressCard();
    document.head.appendChild(script);
  }
}
function copyProgressCardText(){
  const s=overallStats(); const j=state.journal||[];
  const winRate=j.length?Math.round(j.filter(x=>x.result==='Win').length/Math.max(1,j.filter(x=>x.result!=='Open').length)*100):0;
  const text=`🧠 TwoLinesTheory · Progress Report\n━━━━━━━━━━━━━━━━━━━━\n👤 ${state.learner.name||'Learner'} | ${state.learner.track}\n📅 Day ${s.daysLearning} of Learning\n\n📊 Overall Progress: ${s.pct}%\n✅ Topics Completed: ${s.done}/${s.total}\n🏅 Chapters Done: ${s.chaptersDone}/${s.totalChapters}\n🧠 Confidence Index: ${s.avg}%\n\n📝 Journal Stats:\n• Total Entries: ${j.length}\n• Win Rate: ${winRate}%\n• Net Points: ${j.reduce((a,x)=>a+(Number(x.points)||0),0)}\n\n${CURRICULUM.map(c=>{const st=chapterStats(c.id);return `${c.icon} ${c.title}: ${st.pct}% (${st.done}/${st.total})`}).join('\n')}\n\n#TwoLinesTheory #LearningJourney`;
  navigator.clipboard?.writeText(text).then(()=>alert('Progress summary copied to clipboard!'));
}
function copyCommunityMessage(days,pct,done,chapters,journal){
  const msg=`Day ${days} of learning TwoLinesTheory! 🎯\n\nCurrently at ${pct}% overall progress, completed ${done} topics across ${chapters} chapters. Journal entries: ${journal}. Still going! 🚀\n\n#TwoLinesTheory #LearningJourney #TradingEducation`;
  navigator.clipboard?.writeText(msg).then(()=>alert('Message copied!'));
}

        ${profileField('capital','Trading Capital',l.capital,'text','e.g. ₹50,000')}
        ${profileField('instrument','Preferred Instrument',l.instrument,'text','BankNifty / Nifty / Stocks')}

function profileField(id,label,val,type,ph){return `<div class="form-group"><label class="form-label">${label}</label><input class="form-input" id="profile_${id}" type="${type}" value="${esc(val)}" placeholder="${ph||''}"/></div>`}
function saveProfile(){
  ['name','mobile','email','city','experience','capital','instrument','availability','startDate','mentor','track','goal'].forEach(k=>{const el=document.getElementById('profile_'+k);if(el)state.learner[k]=el.value});
  save(); alert('✓ Profile saved successfully!');
}
function handlePhotoUpload(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{state.learner.photo=reader.result;save();};
  reader.readAsDataURL(file);
}

function renderAdmin(){
  document.getElementById('tab-admin').innerHTML=`
  <div class="grid-2 section-gap">
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="dot"></span>Data Controls</div></div>
      <div class="card-body">
        <div class="check-list" style="gap:10px">
          <button class="btn btn-primary" onclick="downloadState()" style="justify-content:flex-start">⬇ Download Learner State (JSON)</button>
          <button class="btn" onclick="document.getElementById('importFile').click()" style="justify-content:flex-start">⬆ Import Learner State (JSON)</button>
          <button class="btn" onclick="copyState()" style="justify-content:flex-start">📋 Copy Current State to Clipboard</button>
          <button class="btn btn-danger" onclick="resetAll()" style="justify-content:flex-start">🗑️ Reset All Progress</button>
        </div>
        <div class="info-box" style="margin-top:16px"><strong>About this app:</strong> Standalone HTML5 LMS — runs locally, no internet required, no server needed. Data stored in browser localStorage. Can be hosted on any web server or later connected to a database.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="dot gold"></span>State Preview</div></div>
      <div class="card-body"><textarea class="form-textarea admin-json" readonly>${esc(JSON.stringify(state,null,2))}</textarea></div>
    </div>
  </div>`;
}
function downloadState(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='twolines_lms_state_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}
function importState(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{state=mergeDeep(deepClone(DEFAULT_STATE),JSON.parse(reader.result));seedTopicStates(state);save();alert('✓ Imported successfully.')}catch(err){alert('Invalid JSON file.')}};reader.readAsText(file);e.target.value=''}
function copyState(){navigator.clipboard?.writeText(JSON.stringify(state,null,2)).then(()=>alert('State copied!'))}
function resetAll(){if(confirm('Reset all progress, journal, screenshots, proofs and profile? This cannot be undone.')){localStorage.removeItem(STORE_KEY);state=loadState();renderAll();alert('✓ All data reset.')}}
